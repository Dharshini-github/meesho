
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meesho</title>
  <style>
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, "Helvetica Neue", sans-serif, "Mier Book";
      background-color: #f9f9f9;
    }

   
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #c80c86;
    }

    .search {
      display:flex;
      margin: 0 20px;
      width:400px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }

    .navbar-buttons {
      display: flex;
      align-items: center;
      gap: 15px;
      padding:10px;
    }

    .navbar-buttons button {
      padding: 8px 16px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .download-btn {
      background-color: #6a0dad;
      color: #fff;
    }

    .download-btn:hover {
      background-color: #5a009d;
    }

    .profile-btn, .cart-btn {
      background-color: #f0f0f0;
      color: #333;
    }

    .profile-btn:hover, .cart-btn:hover {
      background-color: #e0e0e0;
    }

    
    .horizontal-menu-container {
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
    }

    .horizontal-menu {
      display: flex;
      gap: 15px;
      list-style: none;
      padding:0;
      margin: 0;
    }

    .horizontal-menu li {
      padding:15px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <header>
    <div class="navbar">
      <div class="logo">meesho</div>
      <input type="text" class="search" placeholder="Try Saree, Kurti or Search by Product Code">
      <div class="navbar-buttons">
        <button class="download-btn">Download App</button>
        <button class ="Become a Supplier">Become a Supplier</button>
        <button class ="Newsroom">Newsroom</button>
        <button class="profile-btn">Profile</button>
        <button class="cart-btn">Cart</button>
      </div>
    </div>
    <div class="horizontal-menu-container">
      <ul class="horizontal-menu">
        <li>Women Ethnic</li>
        <li>Women Western</li>
        <li>Men</li>
        <li>Kids</li>
        <li>Home & Kitchen</li>
        <li>Beauty & Health</li>
        <li>Jewellery & Accessories</li>
        <li>Bags & Footwear</li>
        <li>Electronics</li>
      </ul>
    </div>
  </header>

  <main>
    <div class="promo">
      <div class="promo-left">
        <h1>Lowest Prices <br> Best Quality Shopping</h1>
        <ul class="features">
          <li>Free Delivery</li>
          <li>Cash on Delivery</li>
          <li>Easy Returns</li>
        </ul>
        
      </div>
    </div>
  </main>
</body>
</html>
