<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="./assets/styles.css"> 
</head>
<body>
    <div class="container">
        <img src="./assets/images/signup.jpg" alt="meesho"class="signup-pic" >
        <h2>Sign Up to view your profile</h2>
        <form style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
          <div class="form-group">
            <label for="phone">Country</label>
            <div style="display: flex; gap: 10px;">
              <select id="country-code" name="country-code" class="country-code" aria-label="Country Code">
                <option value="+91">IN +91</option>
                <option value="+1">US +1</option>
                <option value="+44">UK +44</option>
                <option value="+81">JP +81</option>
                <option value="+61">AU +61</option>
              </select>
              <input type="tel" id="phone" name="phone" placeholder="Phone Number" aria-label="Phone Number" required>
            </div>
          </div>
          <button type="submit" class="continue-btn">Continue</button>
        </form>
        <p class="gittext">By continuing, you agree to Meesho's Terms & Conditions</p>
      </div>
      
      </body>
      </html>
